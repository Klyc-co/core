<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNP — Compression & Resolution Testing v18ad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090f;
      --surface: #0f1520;
      --surface2: #161f30;
      --border: #1e2d45;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --gold: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --text: #dde6f5;
      --muted: #4d6280;
      --knp: #a78bfa;
      --raw: #fb7185;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── ANIMATIONS ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes glow { 0%,100%{box-shadow:0 0 4px var(--green)} 50%{box-shadow:0 0 12px var(--green)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes countUp { from{transform:scale(1.4);color:#fff} to{transform:scale(1)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes noiseDie { 0%{transform:scale(1) rotate(0deg);opacity:1} 100%{transform:scale(0) rotate(180deg);opacity:0} }
    @keyframes signalLock { 0%{letter-spacing:4px;opacity:0} 100%{letter-spacing:0;opacity:1} }

    .animate-in { animation: slideIn 0.3s ease; }
